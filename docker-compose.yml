version: '3.8'

# Generated by Agentic DevOps
# Detected databases: ['mysql', 'postgres']

services:
  app:
    image: backend-of-e-commerce-website-using-fastapi-and-mysql:a895c37
    restart: unless-stopped
    ports:
      - "8000:8000"
    # ── Set these env vars for your app ──
    environment:
      # DB_HOST=mysql
      # DB_USER=appuser
      # DB_PASSWORD=apppassword
      # DB_NAME=appdb
      # DATABASE_URL=mysql+pymysql://appuser:apppassword@mysql/appdb
      # DB_HOST=postgres
      # DB_USER=appuser
      # DB_PASSWORD=apppassword
      # DB_NAME=appdb
      # DATABASE_URL=postgresql://appuser:apppassword@postgres/appdb
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-appdb}
      MYSQL_USER: ${MYSQL_USER:-appuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  postgres_data:
